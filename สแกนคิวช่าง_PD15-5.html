<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>สแกนคิวช่าง – PD15</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #0F1923;
  --card: #1A2736;
  --card2: #1F3044;
  --accent: #F5A623;
  --accent2: #E8831A;
  --green: #27AE60;
  --green-bg: #0D2B1A;
  --text: #F0EDE8;
  --sub: #8A9BB0;
  --border: #2A3D52;
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 40px;
}

/* Header */
.header {
  background: linear-gradient(135deg, #1A2736 0%, #0F1923 100%);
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 20;
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 10px; }
.header-icon {
  width: 40px; height: 40px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.header-title { font-size: 18px; font-weight: 800; color: var(--text); }
.header-sub { font-size: 12px; color: var(--sub); margin-top: 1px; }
.date-badge {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
}

/* Body */
.body { padding: 16px; max-width: 480px; margin: 0 auto; }

/* Upload zone */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  background: var(--card);
  margin-bottom: 14px;
  position: relative;
}
.upload-zone:active { transform: scale(0.98); }
.upload-zone.has-image {
  border-color: var(--accent);
  border-style: solid;
  padding: 0;
  overflow: hidden;
}
.upload-zone img {
  width: 100%; max-height: 280px;
  object-fit: cover;
  border-radius: calc(var(--radius) - 2px);
  display: block;
}
.upload-icon { font-size: 40px; margin-bottom: 10px; }
.upload-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.upload-sub { font-size: 13px; color: var(--sub); }
.change-photo-btn {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(15,25,35,0.85);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px; font-weight: 600;
  color: var(--text);
  cursor: pointer;
}
input[type=file] { display: none; }

/* Analyze button */
.btn-analyze {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #0F1923;
  border: none;
  border-radius: 12px;
  font-family: 'Sarabun', sans-serif;
  font-size: 17px; font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(245,166,35,0.3);
  margin-bottom: 14px;
}
.btn-analyze:active { transform: scale(0.98); }
.btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

/* Loading */
.loading-box {
  display: none;
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  margin-bottom: 14px;
  border: 1px solid var(--border);
}
.loading-box.show { display: block; }
.pulse-ring {
  width: 56px; height: 56px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 15px; font-weight: 600; color: var(--sub); }
.loading-step { font-size: 13px; color: var(--sub); margin-top: 6px; opacity: 0.7; }

/* Result */
.result-box {
  display: none;
  margin-bottom: 14px;
}
.result-box.show { display: block; }

.result-header {
  background: var(--green-bg);
  border: 1px solid var(--green);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 10px;
}
.result-header-icon { font-size: 22px; }
.result-header-title { font-size: 15px; font-weight: 700; color: var(--green); }
.result-header-sub { font-size: 12px; color: var(--sub); margin-top: 2px; }

.result-content {
  background: var(--card);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 16px;
}

/* Summary message preview */
.msg-preview {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  color: var(--text);
  margin-bottom: 14px;
  font-family: 'Sarabun', sans-serif;
}

/* Job cards */
.job-list { margin-bottom: 16px; }
.job-card {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex; align-items: flex-start; gap: 12px;
}
.job-num {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
  color: #0F1923;
  flex-shrink: 0;
  margin-top: 1px;
}
.job-room { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.job-detail { font-size: 13px; color: var(--sub); }
.job-time {
  margin-left: auto;
  font-size: 12px; font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}

/* Stats row */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 16px;
}
.stat-card {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}
.stat-num { font-size: 22px; font-weight: 800; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--sub); margin-top: 2px; }

/* Action buttons */
.btn-share {
  width: 100%;
  padding: 15px;
  background: #06C755;
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Sarabun', sans-serif;
  font-size: 16px; font-weight: 700;
  cursor: pointer;
  margin-bottom: 8px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s;
}
.btn-share:active { transform: scale(0.98); opacity: 0.9; }

.btn-reset {
  width: 100%;
  padding: 13px;
  background: transparent;
  color: var(--sub);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-family: 'Sarabun', sans-serif;
  font-size: 14px; font-weight: 500;
  cursor: pointer;
}

/* Edit area */
.edit-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--sub);
  margin-bottom: 6px;
}
textarea.msg-edit {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  font-family: 'Sarabun', sans-serif;
  font-size: 14px; line-height: 1.7;
  color: var(--text);
  resize: none;
  height: 200px;
  margin-bottom: 12px;
  outline: none;
}
textarea.msg-edit:focus { border-color: var(--accent); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--green);
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 14px; font-weight: 600;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none; white-space: nowrap;
  z-index: 100;
}
.toast.show { opacity: 1; }

.divider {
  height: 1px; background: var(--border);
  margin: 14px 0;
}

.section-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--sub); margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="header-left">
      <div class="header-icon">📋</div>
      <div>
        <div class="header-title">สแกนคิวช่าง</div>
        <div class="header-sub">PD 15 · อ่านกระดาษ → สรุปส่ง LINE</div>
      </div>
    </div>
    <div class="date-badge" id="dateBadge">–</div>
  </div>
</div>

<div class="body">

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📷</div>
    <div class="upload-title">ถ่ายรูปกระดาษคิวช่าง</div>
    <div class="upload-sub">แตะเพื่อเปิดกล้องหรือเลือกรูป</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)">

  <!-- Analyze Button -->
  <button class="btn-analyze" id="btnAnalyze" onclick="analyzeImage()" disabled>
    🤖 ให้ AI อ่านและสรุปงาน
  </button>

  <!-- Loading -->
  <div class="loading-box" id="loadingBox">
    <div class="pulse-ring"></div>
    <div class="loading-text">AI กำลังอ่านกระดาษ...</div>
    <div class="loading-step" id="loadingStep">วิเคราะห์ตัวอักษรในรูปภาพ</div>
  </div>

  <!-- Result -->
  <div class="result-box" id="resultBox">
    <div class="result-header">
      <div class="result-header-icon">✅</div>
      <div>
        <div class="result-header-title">อ่านข้อมูลสำเร็จ</div>
        <div class="result-header-sub" id="resultSub">พบ 0 รายการ</div>
      </div>
    </div>
    <div class="result-content">

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">งานทั้งหมด</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statIn">0</div>
          <div class="stat-label">อยู่ห้อง</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statOut">0</div>
          <div class="stat-label">ไม่อยู่ห้อง</div>
        </div>
      </div>

      <!-- Job cards -->
      <div class="section-label">รายการงาน</div>
      <div class="job-list" id="jobList"></div>

      <div class="divider"></div>

      <!-- Editable message -->
      <div class="edit-label">ข้อความที่จะส่งเข้า LINE กลุ่ม (แก้ไขได้)</div>
      <textarea class="msg-edit" id="msgEdit"></textarea>

      <!-- Share -->
      <button class="btn-share" onclick="shareToLine()">
        <span style="font-size:20px">💬</span> คัดลอกและเปิด LINE
      </button>
      <button class="btn-reset" onclick="resetAll()">📷 สแกนใหม่</button>
    </div>
  </div>

</div>

<div class="toast" id="toast">คัดลอกข้อความแล้ว!</div>

<script>
// Date
const now = new Date();
const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const dateStr = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()+543}`;
document.getElementById('dateBadge').textContent = dateStr;

let imageBase64 = '';

function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    imageBase64 = ev.target.result.split(',')[1];
    const zone = document.getElementById('uploadZone');
    zone.classList.add('has-image');
    zone.innerHTML = `<img src="${ev.target.result}" alt="กระดาษคิวช่าง">
      <div class="change-photo-btn" onclick="event.stopPropagation();document.getElementById('fileInput').click()">🔄 เปลี่ยนรูป</div>`;
    document.getElementById('btnAnalyze').disabled = false;
    document.getElementById('resultBox').classList.remove('show');
  };
  reader.readAsDataURL(file);
}

async function analyzeImage() {
  if (!imageBase64) return;

  document.getElementById('loadingBox').classList.add('show');
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('btnAnalyze').disabled = true;

  const steps = [
    'วิเคราะห์ตัวอักษรในรูปภาพ...',
    'อ่านเลขห้องและรายการงาน...',
    'สรุปและจัดรูปแบบข้อความ...'
  ];
  let stepIdx = 0;
  const stepEl = document.getElementById('loadingStep');
  const stepTimer = setInterval(() => {
    stepIdx = (stepIdx + 1) % steps.length;
    stepEl.textContent = steps[stepIdx];
  }, 1200);

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 }
            },
            {
              type: 'text',
              text: `นี่คือรูปถ่ายของ "ตารางจองคิวช่าง" ของอพาร์ทเม้นท์ PD 15

กรุณาอ่านข้อมูลในตารางและตอบกลับเป็น JSON อย่างเดียว ไม่ต้องมีคำอธิบายหรือ markdown ใดๆ

รูปแบบ JSON ที่ต้องการ:
{
  "date": "วันที่จากกระดาษ เช่น 25 มิ.ย. 69",
  "jobs": [
    {
      "time": "เวลา เช่น 17:00",
      "room": "เลขห้อง",
      "detail": "รายการที่แจ้ง",
      "status": "in" หรือ "out" (ดูจากช่อง อยู่ห้อง/ไม่อยู่ห้อง),
      "phone": "เบอร์โทร ถ้ามี ไม่มีใส่ว่าง"
    }
  ],
  "total": จำนวนงานทั้งหมด,
  "in_count": จำนวนที่อยู่ห้อง,
  "out_count": จำนวนที่ไม่อยู่ห้อง
}

ถ้าไม่มีงานเลยให้ jobs เป็น array ว่าง`
            }
          ]
        }]
      })
    });

    clearInterval(stepTimer);
    const data = await response.json();
    const raw = data.content[0].text.trim();

    let parsed;
    try {
      parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    } catch {
      throw new Error('parse_error');
    }

    renderResult(parsed);

  } catch (err) {
    clearInterval(stepTimer);
    document.getElementById('loadingBox').classList.remove('show');
    document.getElementById('btnAnalyze').disabled = false;
    alert('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้งครับ');
  }
}

function renderResult(data) {
  document.getElementById('loadingBox').classList.remove('show');

  const jobs = data.jobs || [];
  const total = data.total || jobs.length;
  const inCount = data.in_count || jobs.filter(j => j.status === 'in').length;
  const outCount = data.out_count || jobs.filter(j => j.status === 'out').length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statIn').textContent = inCount;
  document.getElementById('statOut').textContent = outCount;
  document.getElementById('resultSub').textContent = `พบ ${total} รายการ · วันที่ ${data.date || dateStr}`;

  // Job cards
  const jobList = document.getElementById('jobList');
  if (jobs.length === 0) {
    jobList.innerHTML = `<div style="text-align:center;padding:20px;color:var(--sub);font-size:14px">ไม่มีรายการงานวันนี้ครับ ✨</div>`;
  } else {
    jobList.innerHTML = jobs.map((job, i) => `
      <div class="job-card">
        <div class="job-num">${i + 1}</div>
        <div style="flex:1">
          <div class="job-room">ห้อง ${job.room} ${job.status === 'in' ? '🟢' : '🔴'}</div>
          <div class="job-detail">${job.detail}${job.phone ? ` · 📞 ${job.phone}` : ''}</div>
        </div>
        <div class="job-time">${job.time} น.</div>
      </div>
    `).join('');
  }

  // Build LINE message
  const dateDisplay = data.date || dateStr;
  let msg = `🔧 คิวช่าง PD 15 · ${dateDisplay}\n`;
  msg += `${'─'.repeat(28)}\n`;

  if (jobs.length === 0) {
    msg += `✨ ไม่มีรายการงานวันนี้\n`;
  } else {
    jobs.forEach((job, i) => {
      const statusIcon = job.status === 'in' ? '🟢' : '🔴';
      msg += `${i + 1}. [${job.time}] ห้อง ${job.room} ${statusIcon}\n`;
      msg += `   📝 ${job.detail}\n`;
      if (job.phone) msg += `   📞 ${job.phone}\n`;
    });
    msg += `${'─'.repeat(28)}\n`;
    msg += `📊 รวม ${total} งาน · อยู่ห้อง ${inCount} · ไม่อยู่ ${outCount}\n`;
  }
  msg += `⏰ รับทราบเวลา ${new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})} น.`;

  document.getElementById('msgEdit').value = msg;
  document.getElementById('resultBox').classList.add('show');
  document.getElementById('btnAnalyze').disabled = false;

  setTimeout(() => {
    document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function shareToLine() {
  const msg = document.getElementById('msgEdit').value;
  navigator.clipboard.writeText(msg).then(() => {
    showToast('คัดลอกข้อความแล้ว!');
    setTimeout(() => {
      window.open('https://line.me/R/nv/chat', '_blank');
    }, 600);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = msg;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('คัดลอกข้อความแล้ว!');
    setTimeout(() => window.open('https://line.me/R/nv/chat', '_blank'), 600);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function resetAll() {
  imageBase64 = '';
  const zone = document.getElementById('uploadZone');
  zone.classList.remove('has-image');
  zone.innerHTML = `<div class="upload-icon">📷</div>
    <div class="upload-title">ถ่ายรูปกระดาษคิวช่าง</div>
    <div class="upload-sub">แตะเพื่อถ่ายรูปหรือเลือกจากคลังรูปภาพ</div>`;
  zone.onclick = () => document.getElementById('fileInput').click();
  document.getElementById('fileInput').value = '';
  document.getElementById('btnAnalyze').disabled = true;
  document.getElementById('resultBox').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
